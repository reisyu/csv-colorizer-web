<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Attribute Colorizer — 3Dジオメトリの属性色分けビューアー</title>
<style>
  :root {
    --bg: #17191d;
    --panel: #21242a;
    --panel-edge: #2e323a;
    --ink: #e8eaed;
    --ink-dim: #9aa0a8;
    --accent: #57c7b8;
    --accent-dim: #2f6d66;
    --warn: #e0a458;
    --mono: ui-monospace, "Cascadia Mono", "Consolas", monospace;
    --sans: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    display: flex;
  }

  /* ---------- サイドパネル ---------- */
  #sidebar {
    width: 300px;
    min-width: 300px;
    height: 100%;
    background: var(--panel);
    border-right: 1px solid var(--panel-edge);
    overflow-y: auto;
    padding: 16px 14px 24px;
    font-size: 13px;
  }
  #sidebar h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  #sidebar .subtitle {
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 18px;
  }
  .step {
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .step-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .row { margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  label.small {
    display: block;
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  input[type="text"], select {
    width: 100%;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--panel-edge);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 13px;
    font-family: var(--sans);
  }
  select:focus, input[type="text"]:focus, button:focus-visible {
    outline: 2px solid var(--accent-dim);
    outline-offset: 1px;
  }
  .filebtn {
    display: block;
    width: 100%;
    text-align: center;
    background: var(--bg);
    border: 1px dashed var(--panel-edge);
    border-radius: 4px;
    color: var(--ink-dim);
    padding: 10px 8px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    font-size: 12px;
    word-break: break-all;
  }
  .filebtn:hover { border-color: var(--accent); color: var(--ink); }
  .filebtn.loaded { border-style: solid; border-color: var(--accent-dim); color: var(--ink); }
  input[type="file"] { display: none; }

  button.action {
    width: 100%;
    background: var(--accent-dim);
    color: var(--ink);
    border: none;
    border-radius: 4px;
    padding: 9px 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .15s;
  }
  button.action:hover:not(:disabled) { background: var(--accent); color: #0d2925; }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost {
    width: 100%;
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--panel-edge);
    border-radius: 4px;
    padding: 7px 8px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    margin-top: 8px;
  }
  button.ghost:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-dim); }
  button.ghost:disabled { opacity: 0.4; cursor: not-allowed; }

  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] {
    flex: 1;
    height: 30px;
    border: 1px solid var(--panel-edge);
    border-radius: 4px;
    background: var(--bg);
    padding: 2px;
    cursor: pointer;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--ink-dim);
    cursor: pointer;
    user-select: none;
  }
  .checkbox-row input { accent-color: var(--accent); }
  .check-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--panel-edge);
    border-radius: 4px;
    padding: 8px;
    max-height: 140px;
    overflow-y: auto;
  }

  #status {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--ink-dim);
    line-height: 1.6;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 6px;
    min-height: 42px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #status.warn { color: var(--warn); }

  /* ---------- ビューポート ---------- */
  #viewport-wrap { flex: 1; position: relative; height: 100%; }
  #viewport { width: 100%; height: 100%; display: block; }

  #dropzone-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: var(--ink-dim);
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  #dropzone-hint.hidden { display: none; }
  #viewport-wrap.dragover::after {
    content: "ここにドロップして読み込む";
    position: absolute; inset: 12px;
    border: 2px dashed var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(23,25,29,.7);
    color: var(--accent);
    font-size: 15px;
    pointer-events: none;
  }

  /* ---------- プログレス表示 ---------- */
  #progress-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(23, 25, 29, 0.75);
    z-index: 10;
  }
  #progress-overlay.active { display: flex; }
  #progress-box {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 8px;
    padding: 20px 28px;
    min-width: 280px;
    text-align: center;
  }
  #progress-text {
    font-size: 13px;
    color: var(--ink);
    margin-bottom: 12px;
  }
  #progress-track {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.1s linear;
  }

  /* ---------- 凡例 ---------- */
  #legend {
    position: absolute;
    left: 16px;
    bottom: 16px;
    background: rgba(33,36,42,.92);
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 11px;
    font-family: var(--mono);
    min-width: 180px;
    display: none;
  }
  #legend .legend-title {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  #legend-bar {
    height: 10px;
    border-radius: 3px;
    margin-bottom: 4px;
  }
  #legend-range { display: flex; justify-content: space-between; color: var(--ink); }
  #legend-cats { display: flex; flex-direction: column; gap: 4px; }
  .cat-item { display: flex; align-items: center; gap: 7px; color: var(--ink); }
  .cat-swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .slider-value {
    font-family: var(--mono);
    color: var(--ink);
    float: right;
  }

  /* ---------- オブジェクトラベル ---------- */
  #labels {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    --label-size: 11px;
  }
  .obj-label {
    position: absolute;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: var(--label-size);
    line-height: 1.45;
    color: var(--ink);
    background: rgba(23, 25, 29, 0.72);
    border-radius: 3px;
    padding: 2px 6px;
    white-space: pre;
    text-align: left;
    will-change: left, top;
  }
  .obj-label .lkey { color: var(--ink-dim); }

  /* ---------- 属性インスペクタ ---------- */
  #inspector {
    position: absolute;
    right: 16px;
    top: 16px;
    background: rgba(33,36,42,.94);
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    font-family: var(--mono);
    max-width: 260px;
    display: none;
  }
  #inspector .insp-name {
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
    word-break: break-all;
  }
  #inspector table { border-collapse: collapse; width: 100%; }
  #inspector td { padding: 1px 0; vertical-align: top; word-break: break-all; }
  #inspector td:first-child { color: var(--ink-dim); padding-right: 10px; white-space: nowrap; }

  @media (max-width: 700px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; height: 45%; border-right: none; border-bottom: 1px solid var(--panel-edge); }
    #viewport-wrap { height: 55%; }
  }
</style>
</head>
<body>

<aside id="sidebar">
  <h1>Geometry Attribute Colorizer</h1>
  <div class="subtitle">3Dジオメトリの属性計算・色分けビューアー</div>

  <!-- STEP 1: モデル -->
  <div class="step">
    <div class="step-label">1. モデルを読み込む</div>
    <div class="row">
      <label class="filebtn" id="glb-btn" for="glb-input">クリックして .glb / .dxf を選択<br>(ビューポートへのドロップも可)</label>
      <input type="file" id="glb-input" accept=".glb,.gltf,.dxf">
    </div>
    <div class="row" style="font-size:11px;color:var(--ink-dim);line-height:1.5">
      DXF(閉じた3Dポリライン)は、幅・高さ・面積・矩形充填率・傾斜角・矩形回転角を自動計算します
    </div>
  </div>

  <!-- STEP 2: 属性データ -->
  <div class="step">
    <div class="step-label">2. 属性データ</div>
    <div class="row" id="attr-source-state" style="font-size:11px;color:var(--ink-dim);line-height:1.5">
      DXFを読み込んだ場合は自動計算されるため、CSVの読み込みは不要です
    </div>
    <div class="row">
      <label class="filebtn" id="csv-btn" for="csv-input">クリックして .csv を選択</label>
      <input type="file" id="csv-input" accept=".csv,text/csv">
    </div>
    <div class="row">
      <label class="small" for="id-column">ID列名</label>
      <select id="id-column" disabled><option>(CSVを読み込んでください)</option></select>
    </div>
    <div class="row">
      <label class="small" for="id-prefix">オブジェクト名の接頭辞(あれば)</label>
      <input type="text" id="id-prefix" placeholder="例: Cell_">
    </div>
  </div>

  <!-- STEP 3: 色分け -->
  <div class="step">
    <div class="step-label">3. 色分けする</div>
    <div class="row">
      <label class="small" for="attribute">色分けする属性</label>
      <select id="attribute" disabled><option>(属性データを読み込んでください)</option></select>
      <div id="attr-description" style="font-size:11px;color:var(--ink-dim);margin-top:4px;line-height:1.5"></div>
    </div>
    <div class="row">
      <label class="small" for="preset">配色</label>
      <select id="preset">
        <option value="BLUE_RED">青 → 赤</option>
        <option value="GREEN_RED">緑 → 赤</option>
        <option value="BLUE_YELLOW">青 → 黄</option>
        <option value="GRAYSCALE">グレースケール</option>
        <option value="CUSTOM">カスタム</option>
      </select>
    </div>
    <div class="row">
      <label class="checkbox-row"><input type="checkbox" id="invert-gradient"> グラデーションを反転</label>
    </div>
    <div class="row" id="custom-colors" style="display:none">
      <div class="color-row">
        <input type="color" id="color-low" value="#1a4ce6" title="開始色(最小値)">
        <input type="color" id="color-mid" value="#ffffff" title="中間色" style="display:none">
        <input type="color" id="color-high" value="#e61a1a" title="終了色(最大値)">
      </div>
      <div style="margin-top:8px">
        <label class="checkbox-row"><input type="checkbox" id="use-mid"> 中間色を使う</label>
      </div>
    </div>
    <div class="row">
      <label class="checkbox-row"><input type="checkbox" id="manual-range"> 範囲を手動で指定</label>
    </div>
    <div class="row" id="manual-range-inputs" style="display:none">
      <div style="display:flex; gap:8px">
        <div style="flex:1">
          <label class="small" for="range-min">最小値</label>
          <input type="text" id="range-min" placeholder="自動">
        </div>
        <div style="flex:1">
          <label class="small" for="range-max">最大値</label>
          <input type="text" id="range-max" placeholder="自動">
        </div>
      </div>
      <button class="ghost" id="autofill-range-btn" style="margin-top:8px">データの最小・最大を入れる</button>
    </div>
    <div class="row">
      <button class="action" id="apply-btn" disabled>色分けを実行</button>
      <button class="ghost" id="reset-btn" disabled>色をリセット</button>
    </div>
  </div>

  <!-- STEP 4: ラベル -->
  <div class="step">
    <div class="step-label">4. ラベル表示</div>
    <div class="row">
      <label class="checkbox-row"><input type="checkbox" id="show-labels"> オブジェクトの位置に属性を表示</label>
    </div>
    <div class="row">
      <label class="small">表示する内容(複数選択可)</label>
      <div id="label-content-list" class="check-list">
        <label class="checkbox-row"><input type="checkbox" value="__id__" checked> ID(オブジェクト名)</label>
      </div>
    </div>
    <div class="row">
      <label class="small" for="label-size">文字サイズ <span id="label-size-value" class="slider-value">11px</span></label>
      <input type="range" id="label-size" min="8" max="24" step="1" value="11">
    </div>
    <div class="row">
      <label class="checkbox-row"><input type="checkbox" id="distance-cull" checked> 遠いラベルを自動的に隠す</label>
    </div>
    <div class="row" id="distance-row">
      <label class="small" for="label-distance">表示距離 <span id="label-distance-value" class="slider-value">-</span></label>
      <input type="range" id="label-distance" min="1" max="100" step="1" value="40">
    </div>
  </div>

  <!-- STEP 5: 書き出し -->
  <div class="step">
    <div class="step-label">5. 書き出し</div>
    <div class="row">
      <button class="ghost" id="download-csv-btn" disabled style="margin-top:0">属性をCSVで保存</button>
    </div>
    <div class="row">
      <button class="ghost" id="export-glb-btn" disabled style="margin-top:0">ID付きGLBで保存</button>
    </div>
    <div class="row" style="font-size:11px;color:var(--ink-dim);line-height:1.5">
      GLBはオブジェクト名(ID)を保持したまま書き出されます。Blender等で再利用できます
    </div>
  </div>

  <div id="status">モデル(GLB / DXF)を読み込んで開始してください。</div>
</aside>

<div id="viewport-wrap">
  <canvas id="viewport"></canvas>
  <div id="labels"></div>
  <div id="dropzone-hint">GLBファイルをここにドラッグ&ドロップ</div>

  <div id="progress-overlay">
    <div id="progress-box">
      <div id="progress-text">処理中...</div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="legend">
    <div class="legend-title" id="legend-title"></div>
    <div id="legend-numeric">
      <div id="legend-bar"></div>
      <div id="legend-range"><span id="legend-min"></span><span id="legend-max"></span></div>
    </div>
    <div id="legend-cats"></div>
  </div>

  <div id="inspector">
    <div class="insp-name" id="insp-name"></div>
    <table id="insp-table"></table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
"use strict";

/* ============================================================
   Three.js シーンのセットアップ
============================================================ */
const canvas = document.getElementById("viewport");
const wrap = document.getElementById("viewport-wrap");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x17191d);

const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 1e7);
camera.position.set(5, 5, 5);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(3, 10, 5);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.35);
dirLight2.position.set(-5, -3, -4);
scene.add(dirLight2);

const grid = new THREE.GridHelper(20, 20, 0x33373f, 0x24272d);
scene.add(grid);

/* ---- 簡易オービットコントロール(回転・ズーム・パン) ---- */
const orbit = {
  target: new THREE.Vector3(0, 0, 0),
  spherical: new THREE.Spherical(10, Math.PI / 3, Math.PI / 4),
  update() {
    const p = new THREE.Vector3().setFromSpherical(this.spherical).add(this.target);
    camera.position.copy(p);
    camera.lookAt(this.target);
  },
};
orbit.update();

let dragMode = null; // "rotate" | "pan"
let lastX = 0, lastY = 0;

canvas.addEventListener("pointerdown", (e) => {
  dragMode = (e.button === 2 || e.shiftKey) ? "pan" : "rotate";
  lastX = e.clientX; lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", (e) => {
  if (!dragMode) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (dragMode === "rotate") {
    orbit.spherical.theta -= dx * 0.006;
    orbit.spherical.phi = Math.min(Math.PI - 0.05, Math.max(0.05, orbit.spherical.phi - dy * 0.006));
  } else {
    const panScale = orbit.spherical.radius * 0.0012;
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
    const up = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
    orbit.target.addScaledVector(right, -dx * panScale);
    orbit.target.addScaledVector(up, dy * panScale);
  }
  orbit.update();
});
canvas.addEventListener("pointerup", () => { dragMode = null; });
canvas.addEventListener("contextmenu", (e) => e.preventDefault());
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  orbit.spherical.radius *= (e.deltaY > 0 ? 1.1 : 0.9);
  orbit.spherical.radius = Math.max(0.01, orbit.spherical.radius);
  orbit.update();
}, { passive: false });

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
  updateLabels();
}
// 注意: animate()の開始はスクリプトの最後で行う(全ての変数宣言が終わってから)

/* ============================================================
   状態
============================================================ */
let modelRoot = null;            // 読み込んだGLBのルート
let meshes = [];                 // {mesh, matchName} の配列
let csvRows = [];                // CSVの行(オブジェクトの配列)
let csvColumns = [];             // 列名
let originalMaterials = new Map(); // mesh.uuid -> 元マテリアル
let labelEntries = [];           // ラベル { el, worldPos } の配列(定義はラベルセクション)
let modelSize = 10;              // モデル全体のサイズ(距離カリングの基準に使う)
const statusEl = document.getElementById("status");

function setStatus(text, warn = false) {
  statusEl.textContent = text;
  statusEl.classList.toggle("warn", warn);
}

/* ============================================================
   属性名の日本語併記と説明
   (自動計算される属性 + よく使われる列名に対応。未知の列名はそのまま表示)
============================================================ */
const ATTR_INFO = {
  Width:     { jp: "幅",       desc: "最小外接矩形の2辺のうち、水平に近い方の辺の長さ" },
  Height:    { jp: "高さ",     desc: "最小外接矩形の2辺のうち、鉛直に近い方の辺の長さ" },
  Area:      { jp: "面積",     desc: "フィット平面に投影した輪郭の面積" },
  FillRate:  { jp: "矩形充填率", desc: "輪郭の面積 ÷ 外接矩形の面積(1に近いほど矩形に近い形)" },
  Tilt:      { jp: "傾斜角",   desc: "面の法線と鉛直(+Z)のなす角。0°=水平な面、90°=垂直な面" },
  RectAngle: { jp: "矩形回転角", desc: "外接矩形の水平辺が面内の水平基準から回転している角度。反時計回り(右上がり)がプラス" },
};

function attrLabel(col) {
  const info = ATTR_INFO[col];
  return info ? `${col}(${info.jp})` : col;
}

function attrDescription(col) {
  const info = ATTR_INFO[col];
  return info ? info.desc : "";
}

/* ============================================================
   ID正規化(Blenderアドオン版と同じロジック)
============================================================ */
function normalizeId(raw) {
  const s = String(raw ?? "").trim();
  const n = Number(s);
  if (s !== "" && Number.isFinite(n)) return String(Math.trunc(n) === n ? Math.trunc(n) : n);
  return s;
}

/* ============================================================
   GLB読み込み(自前の軽量GLBパーサー)
   - GLB(バイナリglTF 2.0)のヘッダー/JSONチャンク/BINチャンクを直接解析
   - ノード名・階層・トランスフォームを保持してメッシュを構築する
============================================================ */

const COMPONENT_TYPES = {
  5120: Int8Array, 5121: Uint8Array, 5122: Int16Array,
  5123: Uint16Array, 5125: Uint32Array, 5126: Float32Array,
};
const TYPE_SIZES = { SCALAR: 1, VEC2: 2, VEC3: 3, VEC4: 4, MAT4: 16 };

function parseGLB(arrayBuffer) {
  const dv = new DataView(arrayBuffer);
  if (dv.getUint32(0, true) !== 0x46546c67) throw new Error("GLB形式ではありません(マジックナンバー不一致)");
  const version = dv.getUint32(4, true);
  if (version !== 2) throw new Error(`glTFバージョン${version}は未対応です(2のみ対応)`);

  let offset = 12;
  let json = null, bin = null;
  while (offset < dv.byteLength) {
    const chunkLen = dv.getUint32(offset, true);
    const chunkType = dv.getUint32(offset + 4, true);
    const chunkStart = offset + 8;
    if (chunkType === 0x4e4f534a) { // JSON
      json = JSON.parse(new TextDecoder().decode(new Uint8Array(arrayBuffer, chunkStart, chunkLen)));
    } else if (chunkType === 0x004e4942) { // BIN
      bin = arrayBuffer.slice(chunkStart, chunkStart + chunkLen);
    }
    offset = chunkStart + chunkLen;
  }
  if (!json) throw new Error("JSONチャンクが見つかりません");
  return { json, bin };
}

function readAccessor(json, bin, accessorIndex) {
  const accessor = json.accessors[accessorIndex];
  const bufferView = json.bufferViews[accessor.bufferView];
  const CompType = COMPONENT_TYPES[accessor.componentType];
  const numComponents = TYPE_SIZES[accessor.type];
  const elementBytes = CompType.BYTES_PER_ELEMENT * numComponents;
  const stride = bufferView.byteStride || elementBytes;
  const baseOffset = (bufferView.byteOffset || 0) + (accessor.byteOffset || 0);

  const out = new CompType(accessor.count * numComponents);
  if (stride === elementBytes) {
    // 密に詰まっている場合はまとめてコピー
    out.set(new CompType(bin, baseOffset, accessor.count * numComponents));
  } else {
    // インターリーブされている場合は1要素ずつ取り出す
    const dv = new DataView(bin);
    const readers = {
      5120: (o) => dv.getInt8(o), 5121: (o) => dv.getUint8(o),
      5122: (o) => dv.getInt16(o, true), 5123: (o) => dv.getUint16(o, true),
      5125: (o) => dv.getUint32(o, true), 5126: (o) => dv.getFloat32(o, true),
    };
    const read = readers[accessor.componentType];
    for (let i = 0; i < accessor.count; i++) {
      for (let c = 0; c < numComponents; c++) {
        out[i * numComponents + c] = read(baseOffset + i * stride + c * CompType.BYTES_PER_ELEMENT);
      }
    }
  }
  return out;
}

function buildSceneFromGLTF(json, bin) {
  const root = new THREE.Group();
  root.name = json.scenes?.[json.scene ?? 0]?.name || "glTF_Scene";

  const defaultMat = () => new THREE.MeshStandardMaterial({ color: 0xb8bcc4, roughness: 0.85, metalness: 0.0, side: THREE.DoubleSide });

  function buildMeshObjects(meshIndex, nodeName) {
    const meshDef = json.meshes[meshIndex];
    const group = new THREE.Group();
    group.name = nodeName || meshDef.name || `mesh_${meshIndex}`;
    for (const prim of meshDef.primitives) {
      if (prim.mode !== undefined && prim.mode !== 4) continue; // TRIANGLESのみ対応
      const geometry = new THREE.BufferGeometry();
      const pos = readAccessor(json, bin, prim.attributes.POSITION);
      geometry.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      if (prim.attributes.NORMAL !== undefined) {
        geometry.setAttribute("normal", new THREE.BufferAttribute(readAccessor(json, bin, prim.attributes.NORMAL), 3));
      }
      if (prim.indices !== undefined) {
        geometry.setIndex(new THREE.BufferAttribute(readAccessor(json, bin, prim.indices), 1));
      }
      if (prim.attributes.NORMAL === undefined) geometry.computeVertexNormals();
      const mesh = new THREE.Mesh(geometry, defaultMat());
      mesh.name = group.name;
      group.add(mesh);
    }
    return group;
  }

  function buildNode(nodeIndex) {
    const nodeDef = json.nodes[nodeIndex];
    let obj;
    if (nodeDef.mesh !== undefined) {
      obj = buildMeshObjects(nodeDef.mesh, nodeDef.name);
    } else {
      obj = new THREE.Group();
      obj.name = nodeDef.name || `node_${nodeIndex}`;
    }
    if (nodeDef.matrix) {
      const m = new THREE.Matrix4().fromArray(nodeDef.matrix);
      m.decompose(obj.position, obj.quaternion, obj.scale);
    } else {
      if (nodeDef.translation) obj.position.fromArray(nodeDef.translation);
      if (nodeDef.rotation) obj.quaternion.fromArray(nodeDef.rotation);
      if (nodeDef.scale) obj.scale.fromArray(nodeDef.scale);
    }
    if (nodeDef.children) {
      for (const childIndex of nodeDef.children) obj.add(buildNode(childIndex));
    }
    return obj;
  }

  const sceneDef = json.scenes?.[json.scene ?? 0];
  const rootNodes = sceneDef?.nodes || (json.nodes ? json.nodes.map((_, i) => i) : []);
  // scenes.nodesが無い場合は、どのノードの子でもないノードをルートとみなす
  if (!sceneDef?.nodes && json.nodes) {
    const childSet = new Set();
    json.nodes.forEach((n) => (n.children || []).forEach((c) => childSet.add(c)));
    rootNodes.length = 0;
    json.nodes.forEach((_, i) => { if (!childSet.has(i)) rootNodes.push(i); });
  }
  for (const nodeIndex of rootNodes) root.add(buildNode(nodeIndex));
  return root;
}

function loadGLBFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const { json, bin } = parseGLB(reader.result);
      if (!bin) throw new Error("BINチャンクが見つかりません(外部バッファ参照の.gltfは未対応です。.glb形式で書き出してください)");

      if (modelRoot) scene.remove(modelRoot);
      originalMaterials.clear();
      modelRoot = buildSceneFromGLTF(json, bin);
      scene.add(modelRoot);

      // メッシュを収集。マッチ用の名前は自分→親の順で探す
      meshes = [];
      modelRoot.traverse((obj) => {
        if (obj.isMesh) {
          let matchName = obj.name;
          if ((!matchName || /^mesh[\d_]*$/i.test(matchName)) && obj.parent && obj.parent.name) {
            matchName = obj.parent.name;
          }
          meshes.push({ mesh: obj, matchName });
          originalMaterials.set(obj.uuid, obj.material);
        }
      });

      frameAll();
      updateDistanceValueText();
      document.getElementById("dropzone-hint").classList.add("hidden");
      document.getElementById("glb-btn").classList.add("loaded");
      document.getElementById("glb-btn").textContent = file.name;
      document.getElementById("export-glb-btn").disabled = false;
      setStatus(`GLBを読み込みました: ${meshes.length} メッシュ`);
      updateApplyEnabled();
    } catch (err) {
      setStatus("GLBの読み込みに失敗しました: " + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

function frameAll() {
  if (!modelRoot) return;
  const box = new THREE.Box3().setFromObject(modelRoot);
  if (box.isEmpty()) return;
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3()).length();
  modelSize = size;
  orbit.target.copy(center);
  orbit.spherical.radius = size * 0.9 + 0.001;
  orbit.update();
  camera.near = size / 1000;
  camera.far = size * 100;
  camera.updateProjectionMatrix();
  grid.position.y = box.min.y;
}

document.getElementById("glb-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.name.toLowerCase().endsWith(".dxf")) loadDXFFile(file);
  else loadGLBFile(file);
  e.target.value = ""; // 同じファイルの再読み込みを可能にする
});

/* ============================================================
   プログレス表示(大規模データの処理中にUIが固まらないように)
============================================================ */
const progressOverlay = document.getElementById("progress-overlay");
const progressText = document.getElementById("progress-text");
const progressFill = document.getElementById("progress-fill");

function showProgress(text, ratio) {
  progressOverlay.classList.add("active");
  progressText.textContent = text;
  progressFill.style.width = (ratio * 100).toFixed(1) + "%";
}
function hideProgress() {
  progressOverlay.classList.remove("active");
}
/* チャンク処理の間にブラウザへ制御を返す */
function nextFrame() {
  return new Promise((resolve) => setTimeout(resolve, 0));
}

/* ============================================================
   DXF読み込み + 幾何属性の自動計算
   - 閉じた3Dポリライン(POLYLINE/VERTEX)のみを対象にパース
   - レイヤー名の末尾の数字をIDとして使う(例: Layer123 -> 123)
   - 平面直角座標系などの大きな座標は自動で原点シフトする
   - 各輪郭について以下を自動計算する:
       Width / Height : 最小外接矩形の2辺(水平に近い軸の方をWidthとする)
       Area           : フィット平面に投影した輪郭の面積
       FillRate       : 矩形充填率 = Area / (Width * Height)
============================================================ */

function parseDXF(text) {
  const lines = text.split(/\r?\n/);
  const polylines = [];
  let current = null;
  let x = 0, y = 0;

  for (let i = 0; i + 1 < lines.length; i += 2) {
    const code = lines[i].trim();
    const value = lines[i + 1].trim();
    if (code === "0") {
      if (value === "POLYLINE") {
        current = { layer: "", verts: [] };
      } else if (value === "SEQEND") {
        if (current && current.verts.length >= 3) polylines.push(current);
        current = null;
      }
    } else if (current) {
      if (code === "8" && current.verts.length === 0) current.layer = value;
      else if (code === "10") x = parseFloat(value);
      else if (code === "20") y = parseFloat(value);
      else if (code === "30") current.verts.push([x, y, parseFloat(value)]);
    }
  }
  return polylines;
}

/* Newell法: 閉じたほぼ平面のポリゴンの法線を安定的に求める */
function newellNormal(verts) {
  let nx = 0, ny = 0, nz = 0;
  for (let i = 0; i < verts.length; i++) {
    const p = verts[i], q = verts[(i + 1) % verts.length];
    nx += (p[1] - q[1]) * (p[2] + q[2]);
    ny += (p[2] - q[2]) * (p[0] + q[0]);
    nz += (p[0] - q[0]) * (p[1] + q[1]);
  }
  const len = Math.hypot(nx, ny, nz) || 1;
  return [nx / len, ny / len, nz / len];
}

/* 2D凸包(Andrew's monotone chain) */
function convexHull2D(points) {
  const pts = [...points].sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  if (pts.length <= 2) return pts;
  const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  return lower.slice(0, -1).concat(upper.slice(0, -1));
}

/* 回転キャリパー法: 凸包の辺ごとに外接矩形を試し、面積最小のものを厳密に求める */
function minAreaRect2D(hull) {
  let best = null, minArea = Infinity;
  const n = hull.length;
  for (let i = 0; i < n; i++) {
    const p1 = hull[i], p2 = hull[(i + 1) % n];
    const ex = p2[0] - p1[0], ey = p2[1] - p1[1];
    const len = Math.hypot(ex, ey);
    if (len < 1e-12) continue;
    const ux = ex / len, uy = ey / len;   // 辺方向
    const vx = -uy, vy = ux;              // 垂直方向
    let minU = Infinity, maxU = -Infinity, minV = Infinity, maxV = -Infinity;
    for (const [px, py] of hull) {
      const pu = px * ux + py * uy, pv = px * vx + py * vy;
      if (pu < minU) minU = pu; if (pu > maxU) maxU = pu;
      if (pv < minV) minV = pv; if (pv > maxV) maxV = pv;
    }
    const w = maxU - minU, h = maxV - minV, area = w * h;
    if (area < minArea) {
      minArea = area;
      best = { w, h, axisU: [ux, uy], axisV: [vx, vy] };
    }
  }
  return best;
}

/* 1つの輪郭(3D頂点列)から幾何属性を計算する */
function computeContourAttributes(verts) {
  // フィット平面の基底(法線 + 面内の直交2軸)
  const normal = newellNormal(verts);
  let ref = Math.abs(normal[0]) > 0.9 ? [0, 1, 0] : [1, 0, 0];
  const dot = ref[0] * normal[0] + ref[1] * normal[1] + ref[2] * normal[2];
  let u = [ref[0] - normal[0] * dot, ref[1] - normal[1] * dot, ref[2] - normal[2] * dot];
  const ulen = Math.hypot(...u) || 1;
  u = [u[0] / ulen, u[1] / ulen, u[2] / ulen];
  const v = [
    normal[1] * u[2] - normal[2] * u[1],
    normal[2] * u[0] - normal[0] * u[2],
    normal[0] * u[1] - normal[1] * u[0],
  ];

  // 重心を原点として平面(u, v)に投影
  const cx = verts.reduce((s, p) => s + p[0], 0) / verts.length;
  const cy = verts.reduce((s, p) => s + p[1], 0) / verts.length;
  const cz = verts.reduce((s, p) => s + p[2], 0) / verts.length;
  const pts2d = verts.map((p) => {
    const rx = p[0] - cx, ry = p[1] - cy, rz = p[2] - cz;
    return [rx * u[0] + ry * u[1] + rz * u[2], rx * v[0] + ry * v[1] + rz * v[2]];
  });

  // 面積(靴ひも公式)
  let area = 0;
  for (let i = 0; i < pts2d.length; i++) {
    const p = pts2d[i], q = pts2d[(i + 1) % pts2d.length];
    area += p[0] * q[1] - q[0] * p[1];
  }
  area = Math.abs(area) / 2;

  // 最小外接矩形
  const hull = convexHull2D(pts2d);
  const rect = minAreaRect2D(hull);
  if (!rect) return null;

  // 矩形の2軸を3Dに戻し、水平に近い方(Z成分が小さい方)をWidthとする
  const axis1 = [
    u[0] * rect.axisU[0] + v[0] * rect.axisU[1],
    u[1] * rect.axisU[0] + v[1] * rect.axisU[1],
    u[2] * rect.axisU[0] + v[2] * rect.axisU[1],
  ];
  const axis2 = [
    u[0] * rect.axisV[0] + v[0] * rect.axisV[1],
    u[1] * rect.axisV[0] + v[1] * rect.axisV[1],
    u[2] * rect.axisV[0] + v[2] * rect.axisV[1],
  ];
  let width, height, widthAxis;
  if (Math.abs(axis1[2]) <= Math.abs(axis2[2])) {
    width = rect.w; height = rect.h; widthAxis = axis1;
  } else {
    width = rect.h; height = rect.w; widthAxis = axis2;
  }

  const fillRate = (rect.w * rect.h) > 0 ? area / (rect.w * rect.h) : 0;

  // 法線と +Z ベクトルのなす角(傾斜角、度)を計算する
  // 法線は Newell 法で符号が決まるため、上下どちらを向いていても
  // 「面がどれだけ傾いているか」を表すよう 0〜90度に正規化する
  let tilt = Math.acos(Math.min(1, Math.max(-1, Math.abs(normal[2])))) * 180 / Math.PI;

  // 外接矩形の水平辺(widthAxis)が、面内での水平基準に対して
  // 反時計回りに何度回転しているかを符号付きで求める(RectAngle)。
  //   面内水平基準 h = 法線 × +Z を正規化したもの(面と水平面の交線 = 走向方向)
  //   面内鉛直基準 vv = 法線 × h (面内で上向き)
  //   widthAxis を (h, vv) 座標に射影し、atan2 で角度を出す
  const nz = [0, 0, 1];
  let h = [
    normal[1] * nz[2] - normal[2] * nz[1],
    normal[2] * nz[0] - normal[0] * nz[2],
    normal[0] * nz[1] - normal[1] * nz[0],
  ];
  let hlen = Math.hypot(...h);
  let rectAngle;
  if (hlen < 1e-9) {
    // 面がほぼ水平で「面内水平」が定義できない場合は角度0とする
    rectAngle = 0;
  } else {
    h = [h[0] / hlen, h[1] / hlen, h[2] / hlen];
    const vv = [
      normal[1] * h[2] - normal[2] * h[1],
      normal[2] * h[0] - normal[0] * h[2],
      normal[0] * h[1] - normal[1] * h[0],
    ];
    // widthAxis は向きが2通りあるので、面内水平基準と同じ側(h方向成分が正)に揃える
    let wa = widthAxis.slice();
    const dotH = wa[0] * h[0] + wa[1] * h[1] + wa[2] * h[2];
    if (dotH < 0) wa = [-wa[0], -wa[1], -wa[2]];
    const compH = wa[0] * h[0] + wa[1] * h[1] + wa[2] * h[2];
    const compV = wa[0] * vv[0] + wa[1] * vv[1] + wa[2] * vv[2];
    // 反時計回り(面内上向き成分が正)をプラスにする
    rectAngle = Math.atan2(compV, compH) * 180 / Math.PI;
  }

  return { width, height, area, fillRate, tilt, rectAngle, pts2d };
}

function loadDXFFile(file) {
  setStatus("DXFを解析中...");
  showProgress("DXFを解析中...", 0);
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      // パース自体はテキスト走査1回なので同期でも比較的速いが、
      // 直前にプログレスを描画させるため1フレーム待つ
      await nextFrame();
      const contours = parseDXF(reader.result);
      if (contours.length === 0) {
        hideProgress();
        setStatus("DXFから閉じたポリラインが見つかりませんでした。", true);
        return;
      }

      // --- 原点シフト量を全頂点のバウンディングボックス中心から決める ---
      let minX = Infinity, minY = Infinity, minZ = Infinity;
      let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
      for (const c of contours) {
        for (const [px, py, pz] of c.verts) {
          if (px < minX) minX = px; if (px > maxX) maxX = px;
          if (py < minY) minY = py; if (py > maxY) maxY = py;
          if (pz < minZ) minZ = pz; if (pz > maxZ) maxZ = pz;
        }
      }
      const ox = (minX + maxX) / 2, oy = (minY + maxY) / 2, oz = (minZ + maxZ) / 2;

      // --- メッシュ生成 + 属性計算(チャンク分割でUIを固めない) ---
      if (modelRoot) scene.remove(modelRoot);
      originalMaterials.clear();
      modelRoot = new THREE.Group();
      modelRoot.name = "DXF";
      meshes = [];
      const csvLines = ["ID,Width,Height,Area,FillRate,Tilt,RectAngle"];
      let failed = 0;

      const CHUNK = 200;
      const total = contours.length;
      const sharedMaterialParams = { color: 0xb8bcc4, roughness: 0.85, metalness: 0.0, side: THREE.DoubleSide };

      for (let start = 0; start < total; start += CHUNK) {
        const end = Math.min(start + CHUNK, total);
        for (let ci = start; ci < end; ci++) {
          const contour = contours[ci];
          // レイヤー名の末尾の数字をIDにする(数字がなければレイヤー名そのまま)
          const m = contour.layer.match(/(\d+)\s*$/);
          const id = m ? m[1] : contour.layer;

          const attrs = computeContourAttributes(contour.verts);
          if (!attrs) { failed++; continue; }

          // 三角形分割(投影した2D座標を使い、頂点は元の3D座標で構築)
          const shapeVecs = attrs.pts2d.map((p) => new THREE.Vector2(p[0], p[1]));
          let triangles;
          try {
            triangles = THREE.ShapeUtils.triangulateShape(shapeVecs, []);
          } catch (e) { failed++; continue; }

          const positions = new Float32Array(contour.verts.length * 3);
          for (let i = 0; i < contour.verts.length; i++) {
            positions[i * 3] = contour.verts[i][0] - ox;
            // DXFはZ-up、Three.jsはY-upなので座標軸を入れ替える(Y<->Z)
            positions[i * 3 + 1] = contour.verts[i][2] - oz;
            positions[i * 3 + 2] = -(contour.verts[i][1] - oy);
          }
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geometry.setIndex(triangles.flat());
          geometry.computeVertexNormals();

          const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial(sharedMaterialParams));
          mesh.name = id;
          modelRoot.add(mesh);
          meshes.push({ mesh, matchName: id });
          originalMaterials.set(mesh.uuid, mesh.material);

          csvLines.push(
            `${id},${attrs.width.toFixed(4)},${attrs.height.toFixed(4)},` +
            `${attrs.area.toFixed(6)},${attrs.fillRate.toFixed(4)},${attrs.tilt.toFixed(2)},` +
            `${attrs.rectAngle.toFixed(2)}`
          );
        }
        showProgress(`属性を計算中... ${end.toLocaleString()} / ${total.toLocaleString()}`, end / total);
        await nextFrame();  // ブラウザに制御を返す(UIが固まらない)
      }

      scene.add(modelRoot);
      frameAll();
      updateDistanceValueText();
      hideProgress();
      document.getElementById("dropzone-hint").classList.add("hidden");
      document.getElementById("glb-btn").classList.add("loaded");
      document.getElementById("glb-btn").textContent = file.name;

      document.getElementById("attr-source-state").textContent =
        "✓ DXFから自動計算した属性を使用中(CSVの読み込みは不要です)";
      document.getElementById("attr-source-state").style.color = "var(--accent)";
      setTimeout(() => {

}

/* ---- ID付きGLBエクスポート ----
   表示中の全メッシュを、ノード名(=ID)を保持したGLB(glTF 2.0バイナリ)として書き出す。
   外部ライブラリを使わず、position/indexとノード名だけの最小構成のGLBを自前で組み立てる。 */
function exportGLB() {
  if (meshes.length === 0) return;

  const jsonBuffers = [];   // 各メッシュのバイナリ(position, index)
  let byteOffset = 0;
  const bufferViews = [];
  const accessors = [];
  const gltfMeshes = [];
  const nodes = [];

  const pushBufferView = (typedArray, target) => {
    const bytes = new Uint8Array(typedArray.buffer, typedArray.byteOffset, typedArray.byteLength);
    // 4バイト境界にパディング
    const pad = (4 - (byteOffset % 4)) % 4;
    if (pad > 0) { jsonBuffers.push(new Uint8Array(pad)); byteOffset += pad; }
    jsonBuffers.push(bytes);
    const view = { buffer: 0, byteOffset, byteLength: typedArray.byteLength };
    if (target) view.target = target;
    byteOffset += typedArray.byteLength;
    bufferViews.push(view);
    return bufferViews.length - 1;
  };

  for (const { mesh, matchName } of meshes) {
    const geom = mesh.geometry;
    const posAttr = geom.getAttribute("position");
    // ワールド変換を適用した頂点座標を書き出す
    const pos = new Float32Array(posAttr.count * 3);
    const tmp = new THREE.Vector3();
    for (let i = 0; i < posAttr.count; i++) {
      tmp.fromBufferAttribute(posAttr, i).applyMatrix4(mesh.matrixWorld);
      pos[i * 3] = tmp.x; pos[i * 3 + 1] = tmp.y; pos[i * 3 + 2] = tmp.z;
    }
    // バウンディング(accessorのmin/maxは必須)
    let mnx = Infinity, mny = Infinity, mnz = Infinity, mxx = -Infinity, mxy = -Infinity, mxz = -Infinity;
    for (let i = 0; i < pos.length; i += 3) {
      mnx = Math.min(mnx, pos[i]); mxx = Math.max(mxx, pos[i]);
      mny = Math.min(mny, pos[i + 1]); mxy = Math.max(mxy, pos[i + 1]);
      mnz = Math.min(mnz, pos[i + 2]); mxz = Math.max(mxz, pos[i + 2]);
    }

    const posView = pushBufferView(pos, 34962);
    const posAccessor = accessors.length;
    accessors.push({
      bufferView: posView, componentType: 5126, count: posAttr.count,
      type: "VEC3", min: [mnx, mny, mnz], max: [mxx, mxy, mxz],
    });

    const primitive = { attributes: { POSITION: posAccessor }, mode: 4 };

    // インデックス
    let index = geom.getIndex();
    if (index) {
      const arr = index.count > 65535 ? new Uint32Array(index.array) : new Uint16Array(index.array);
      const compType = index.count > 65535 ? 5125 : 5123;
      const idxView = pushBufferView(arr, 34963);
      const idxAccessor = accessors.length;
      accessors.push({ bufferView: idxView, componentType: compType, count: arr.length, type: "SCALAR" });
      primitive.indices = idxAccessor;
    }

    gltfMeshes.push({ primitives: [primitive] });
    nodes.push({ mesh: gltfMeshes.length - 1, name: String(matchName) });
  }

  // バイナリチャンクを結合
  let totalBin = 0;
  for (const b of jsonBuffers) totalBin += b.byteLength;
  const binPad = (4 - (totalBin % 4)) % 4;
  const binChunk = new Uint8Array(totalBin + binPad);
  let off = 0;
  for (const b of jsonBuffers) { binChunk.set(b, off); off += b.byteLength; }

  const gltf = {
    asset: { version: "2.0", generator: "CSV Attribute Colorizer Web" },
    scene: 0,
    scenes: [{ nodes: nodes.map((_, i) => i) }],
    nodes, meshes: gltfMeshes, accessors, bufferViews,
    buffers: [{ byteLength: binChunk.byteLength }],
  };

  // JSONチャンク(4バイト境界にスペースでパディング)
  let jsonStr = JSON.stringify(gltf);
  while (jsonStr.length % 4 !== 0) jsonStr += " ";
  const jsonChunk = new TextEncoder().encode(jsonStr);

  const totalLength = 12 + 8 + jsonChunk.byteLength + 8 + binChunk.byteLength;
  const out = new ArrayBuffer(totalLength);
  const dv = new DataView(out);
  let p = 0;
  dv.setUint32(p, 0x46546c67, true); p += 4; // "glTF"
  dv.setUint32(p, 2, true); p += 4;
  dv.setUint32(p, totalLength, true); p += 4;
  dv.setUint32(p, jsonChunk.byteLength, true); p += 4;
  dv.setUint32(p, 0x4e4f534a, true); p += 4; // "JSON"
  new Uint8Array(out, p, jsonChunk.byteLength).set(jsonChunk); p += jsonChunk.byteLength;
  dv.setUint32(p, binChunk.byteLength, true); p += 4;
  dv.setUint32(p, 0x004e4942, true); p += 4; // "BIN"
  new Uint8Array(out, p, binChunk.byteLength).set(binChunk);

  const blob = new Blob([out], { type: "model/gltf-binary" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "model_with_ids.glb";
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus(`ID付きGLBを書き出しました: ${meshes.length} オブジェクト`);
}

document.getElementById("export-glb-btn").addEventListener("click", exportGLB);

/* ============================================================
   CSV読み込み
============================================================ */
function loadCSVText(text, displayName) {
  Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    complete: (result) => {
      csvRows = result.data;
      csvColumns = result.meta.fields || [];
      if (csvColumns.length < 2) {
        setStatus("CSVにはID列と属性列の少なくとも2列が必要です。", true);
        return;
      }
      // ID列ドロップダウン
      const idSel = document.getElementById("id-column");
      idSel.innerHTML = "";
      csvColumns.forEach((c) => {
        const o = document.createElement("option");
        o.value = c; o.textContent = c;
        idSel.appendChild(o);
      });
      idSel.disabled = false;
      // "id" に近い列名があれば初期選択
      const guess = csvColumns.find((c) => c.trim().toLowerCase() === "id");
      if (guess) idSel.value = guess;

      refreshAttributeOptions();
      refreshLabelContentOptions();
      document.getElementById("csv-btn").classList.add("loaded");
      document.getElementById("csv-btn").textContent = displayName;
      setStatus(`CSVを読み込みました: ${csvRows.length} 行 / 列: ${csvColumns.join(", ")}`);
      updateApplyEnabled();
    },
    error: (err) => setStatus("CSVの読み込みに失敗しました: " + err.message, true),
  });
}

function loadCSVFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    loadCSVText(reader.result, file.name);
    document.getElementById("attr-source-state").textContent = "外部CSVの属性を使用中";
    document.getElementById("attr-source-state").style.color = "var(--ink-dim)";
  };
  reader.readAsText(file);
}

/* ============================================================
   色計算(Blenderアドオン版と同じロジック)
============================================================ */
function isNumericColumn(rows, col) {
  for (const row of rows) {
    const v = (row[col] ?? "").toString().trim();
    if (v === "") continue;
    if (!Number.isFinite(Number(v))) return false;
  }
  return true;
}

function hsvToRgb(h, s, v) {
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
  const m = i % 6;
  const r = [v, q, p, p, t, v][m], g = [t, v, v, q, p, p][m], b = [p, p, t, v, v, q][m];
  return [r, g, b];
}

function hexToRgb01(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
}

function lerpColor(a, b, t) {
  return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
}

const HUE_RANGES = { BLUE_RED: [0.66, 0.0], GREEN_RED: [0.33, 0.0], BLUE_YELLOW: [0.66, 0.16] };

function numericToColor(value, vmin, vmax, preset, cLow, cHigh, useMid, cMid, invert) {
  let t = vmax === vmin ? 0.5 : Math.max(0, Math.min(1, (value - vmin) / (vmax - vmin)));
  if (invert) t = 1 - t;
  if (preset === "CUSTOM") {
    if (useMid) {
      return t <= 0.5 ? lerpColor(cLow, cMid, t / 0.5) : lerpColor(cMid, cHigh, (t - 0.5) / 0.5);
    }
    return lerpColor(cLow, cHigh, t);
  }
  if (preset === "GRAYSCALE") return [t, t, t];
  const [h0, h1] = HUE_RANGES[preset] || HUE_RANGES.BLUE_RED;
  return hsvToRgb(h0 + (h1 - h0) * t, 0.85, 0.95);
}

const PALETTE = [
  [0.90, 0.20, 0.20], [0.20, 0.55, 0.90], [0.25, 0.75, 0.35], [0.95, 0.65, 0.15],
  [0.60, 0.30, 0.80], [0.20, 0.80, 0.80], [0.85, 0.85, 0.20], [0.55, 0.55, 0.55],
];
let categoryColorCache = {};
function textToColor(category) {
  if (!(category in categoryColorCache)) {
    categoryColorCache[category] = PALETTE[Object.keys(categoryColorCache).length % PALETTE.length];
  }
  return categoryColorCache[category];
}

/* ============================================================
   色分けの実行
============================================================ */
let attributesByMesh = new Map(); // mesh.uuid -> CSV行(インスペクタ用)

let hasApplied = false;      // 一度でも色分けを実行したか(即時反映のガード)
let reapplyTimer = null;

/* 設定変更時の即時反映(実行済みの場合のみ、デバウンス付きで再適用する) */
function scheduleReapply() {
  if (!hasApplied) return;
  clearTimeout(reapplyTimer);
  reapplyTimer = setTimeout(applyColorize, 150);
}

function applyColorize() {
  const idCol = document.getElementById("id-column").value;
  const attr = document.getElementById("attribute").value;
  const prefix = document.getElementById("id-prefix").value;
  const preset = document.getElementById("preset").value;
  const cLow = hexToRgb01(document.getElementById("color-low").value);
  const cHigh = hexToRgb01(document.getElementById("color-high").value);
  const cMid = hexToRgb01(document.getElementById("color-mid").value);
  const useMid = document.getElementById("use-mid").checked;
  const invert = document.getElementById("invert-gradient").checked;

  // CSVをIDで引けるようにする
  const dataById = new Map();
  for (const row of csvRows) dataById.set(normalizeId(row[idCol]), row);

  const numericMode = isNumericColumn(csvRows, attr);
  let vmin = Infinity, vmax = -Infinity;
  if (numericMode) {
    for (const row of csvRows) {
      const v = (row[attr] ?? "").toString().trim();
      if (v === "") continue;
      const n = Number(v);
      vmin = Math.min(vmin, n); vmax = Math.max(vmax, n);
    }
    // 範囲の手動指定が有効なら、入力値で上書きする(空欄の側は自動のまま)
    if (document.getElementById("manual-range").checked) {
      const manMin = Number(document.getElementById("range-min").value);
      const manMax = Number(document.getElementById("range-max").value);
      if (document.getElementById("range-min").value.trim() !== "" && Number.isFinite(manMin)) vmin = manMin;
      if (document.getElementById("range-max").value.trim() !== "" && Number.isFinite(manMax)) vmax = manMax;
    }
  }

  categoryColorCache = {};
  attributesByMesh.clear();
  let matched = 0;
  const unmatched = [];

  for (const { mesh, matchName } of meshes) {
    let id = matchName || "";
    if (prefix && id.startsWith(prefix)) id = id.slice(prefix.length);
    id = normalizeId(id);
    const row = dataById.get(id);
    if (!row) { unmatched.push(matchName); continue; }

    attributesByMesh.set(mesh.uuid, row);

    const raw = (row[attr] ?? "").toString();
    let rgb;
    if (numericMode && raw.trim() !== "" && Number.isFinite(vmin)) {
      rgb = numericToColor(Number(raw), vmin, vmax, preset, cLow, cHigh, useMid, cMid, invert);
    } else if (numericMode) {
      rgb = [0.5, 0.5, 0.5];
    } else {
      rgb = textToColor(raw);
    }
    // 既にこのアプリで着色済みのマテリアルなら、色だけ更新する(再適用の高速化)
    if (mesh.material && mesh.material.userData && mesh.material.userData.gac) {
      mesh.material.color.setRGB(rgb[0], rgb[1], rgb[2]);
    } else {
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(rgb[0], rgb[1], rgb[2]),
        roughness: 0.85, metalness: 0.0,
        side: THREE.DoubleSide,
      });
      mat.userData.gac = true;
      mesh.material = mat;
    }
    matched++;
  }

  updateLegend(attr, numericMode, vmin, vmax, preset, cLow, cHigh, useMid, cMid, invert);
  rebuildLabels();
  document.getElementById("reset-btn").disabled = false;
  document.getElementById("download-csv-btn").disabled = false;

  let msg = `完了: ${matched} 個に反映 (対象属性: ${attr}, ${numericMode ? "数値" : "テキスト"})`;
  if (unmatched.length) msg += `\n未マッチ: ${unmatched.length} 個 (例: ${unmatched.slice(0, 5).join(", ")})`;
  setStatus(msg, unmatched.length > 0);
  hasApplied = true;
}

document.getElementById("apply-btn").addEventListener("click", applyColorize);

/* 設定変更で即時反映(一度実行した後のみ有効) */
for (const id of ["preset", "use-mid", "manual-range", "attribute", "id-prefix", "invert-gradient"]) {

/* ============================================================
   凡例
============================================================ */
function rgbToCss(rgb) {
  return `rgb(${Math.round(rgb[0] * 255)},${Math.round(rgb[1] * 255)},${Math.round(rgb[2] * 255)})`;
}

function updateLegend(attr, numericMode, vmin, vmax, preset, cLow, cHigh, useMid, cMid, invert) {
  const legend = document.getElementById("legend");
  const numDiv = document.getElementById("legend-numeric");
  const catDiv = document.getElementById("legend-cats");
  document.getElementById("legend-title").textContent = attrLabel(attr);
  legend.style.display = "block";

  if (numericMode) {
    numDiv.style.display = "block";
    catDiv.style.display = "none";
    const stops = [];
    for (let i = 0; i <= 10; i++) {
      const rgb = numericToColor(vmin + (vmax - vmin) * (i / 10), vmin, vmax, preset, cLow, cHigh, useMid, cMid, invert);
      stops.push(`${rgbToCss(rgb)} ${i * 10}%`);
    }
    document.getElementById("legend-bar").style.background = `linear-gradient(to right, ${stops.join(",")})`;
    document.getElementById("legend-min").textContent = Number(vmin.toPrecision(5));
    document.getElementById("legend-max").textContent = Number(vmax.toPrecision(5));
  } else {
    numDiv.style.display = "none";
    catDiv.style.display = "flex";
    catDiv.innerHTML = "";
    for (const [cat, rgb] of Object.entries(categoryColorCache)) {
      const item = document.createElement("div");
      item.className = "cat-item";
      const sw = document.createElement("span");
      sw.className = "cat-swatch";
      sw.style.background = rgbToCss(rgb);
      const label = document.createElement("span");
      label.textContent = cat || "(空欄)";
      item.appendChild(sw); item.appendChild(label);
      catDiv.appendChild(item);
    }
  }
}

/* ============================================================
   クリックで属性を表示(インスペクタ)
============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downPos = null;

canvas.addEventListener("pointerdown", (e) => { downPos = [e.clientX, e.clientY]; });
canvas.addEventListener("pointerup", (e) => {
  // ドラッグ(カメラ操作)とクリックを区別する
  if (!downPos) return;
  const moved = Math.hypot(e.clientX - downPos[0], e.clientY - downPos[1]);
  downPos = null;
  if (moved > 4 || meshes.length === 0) return;

  const rect = canvas.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes.map((m) => m.mesh), false);

  const inspector = document.getElementById("inspector");
  if (!hits.length) { inspector.style.display = "none"; return; }

  const mesh = hits[0].object;
  const entry = meshes.find((m) => m.mesh === mesh);
  document.getElementById("insp-name").textContent = entry ? entry.matchName : mesh.name;

  const table = document.getElementById("insp-table");
  table.innerHTML = "";
  const row = attributesByMesh.get(mesh.uuid);
  if (row) {
    for (const [k, v] of Object.entries(row)) {
      const tr = document.createElement("tr");
      const td1 = document.createElement("td"); td1.textContent = attrLabel(k);
      const td2 = document.createElement("td"); td2.textContent = v;
      tr.appendChild(td1); tr.appendChild(td2);
      table.appendChild(tr);
    }
  } else {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 2;
    td.textContent = "(CSV属性は未割り当て)";
    tr.appendChild(td);
    table.appendChild(tr);
  }
  inspector.style.display = "block";
});

/* ============================================================
   オブジェクトラベル(位置に合わせて属性値を常時表示)
============================================================ */
const labelsContainer = document.getElementById("labels");
const showLabelsCheckbox = document.getElementById("show-labels");
const labelContentList = document.getElementById("label-content-list");

const _projVec = new THREE.Vector3();

function getSelectedLabelKeys() {
  return [...labelContentList.querySelectorAll("input:checked")].map((c) => c.value);
}

function formatValue(v) {
  const n = Number(v);
  return (String(v).trim() !== "" && Number.isFinite(n)) ? String(Number(n.toPrecision(5))) : String(v);
}

function rebuildLabels() {
  labelsContainer.innerHTML = "";
  labelEntries = [];
  if (!showLabelsCheckbox.checked || meshes.length === 0) return;

  const keys = getSelectedLabelKeys();
  if (keys.length === 0) return;
  const multi = keys.length > 1;

  const box = new THREE.Box3();
  const center = new THREE.Vector3();

  for (const { mesh, matchName } of meshes) {
    const row = attributesByMesh.get(mesh.uuid);
    const lines = [];

    for (const key of keys) {
      if (key === "__id__") {
        lines.push({ key: "ID", value: matchName });
      } else {
        if (!row) continue;
        const v = row[key];
        if (v === undefined || v === null || String(v).trim() === "") continue;
        lines.push({ key, value: formatValue(v) });
      }
    }
    if (lines.length === 0) continue;

    box.setFromObject(mesh);
    if (box.isEmpty()) continue;
    box.getCenter(center);

    const el = document.createElement("div");
    el.className = "obj-label";
    // 複数選択時は「列名: 値」の形式、単一選択時は値のみ表示
    for (const line of lines) {
      const div = document.createElement("div");
      if (multi) {
        const keySpan = document.createElement("span");
        keySpan.className = "lkey";
        keySpan.textContent = line.key + ": ";
        div.appendChild(keySpan);
      }
      div.appendChild(document.createTextNode(line.value));
      el.appendChild(div);
    }
    labelsContainer.appendChild(el);
    labelEntries.push({ el, worldPos: center.clone() });
  }
}

function updateLabels() {
  if (labelEntries.length === 0) return;
  const w = wrap.clientWidth, h = wrap.clientHeight;

  // 距離カリング: スライダー値(1-100)をモデルサイズ基準の実距離に変換
  // スライダー最大(100)でモデルサイズの4倍 = 実質無制限に近い
  const cullEnabled = distanceCullCheckbox.checked;
  const sliderVal = Number(labelDistanceSlider.value);
  const maxDist = modelSize * 4 * (sliderVal / 100);
  const maxDistSq = maxDist * maxDist;
  const camPos = camera.position;

  for (const { el, worldPos } of labelEntries) {
    if (cullEnabled && camPos.distanceToSquared(worldPos) > maxDistSq) {
      el.style.display = "none";
      continue;
    }
    _projVec.copy(worldPos).project(camera);
    // カメラの後ろ、または画面外は非表示
    if (_projVec.z > 1 || _projVec.x < -1.05 || _projVec.x > 1.05 || _projVec.y < -1.05 || _projVec.y > 1.05) {
      el.style.display = "none";
      continue;
    }
    el.style.display = "block";
    el.style.left = ((_projVec.x + 1) / 2 * w) + "px";
    el.style.top = ((-_projVec.y + 1) / 2 * h) + "px";
  }
}

function refreshLabelContentOptions() {
  const idCol = document.getElementById("id-column").value;
  // 現在のチェック状態を保持
  const checked = new Set(getSelectedLabelKeys());

  labelContentList.innerHTML = "";
  const makeItem = (value, text) => {
    const label = document.createElement("label");
    label.className = "checkbox-row";
    const input = document.createElement("input");
    input.type = "checkbox";
    input.value = value;
    input.checked = checked.has(value) || (value === "__id__" && checked.size === 0);
    input.addEventListener("change", rebuildLabels);
    label.appendChild(input);
    label.appendChild(document.createTextNode(" " + text));
    labelContentList.appendChild(label);
  };

  makeItem("__id__", "ID(オブジェクト名)");
  csvColumns.filter((c) => c !== idCol).forEach((c) => makeItem(c, attrLabel(c)));
}

showLabelsCheckbox.addEventListener("change", rebuildLabels);
// 初期状態のIDチェックボックスにもイベントを付ける
labelContentList.querySelector("input")?.addEventListener("change", rebuildLabels);

/* ---- 文字サイズと表示距離の設定 ---- */
const labelSizeSlider = document.getElementById("label-size");
const labelSizeValue = document.getElementById("label-size-value");
const distanceCullCheckbox = document.getElementById("distance-cull");
const labelDistanceSlider = document.getElementById("label-distance");
const labelDistanceValue = document.getElementById("label-distance-value");
const distanceRow = document.getElementById("distance-row");

labelSizeSlider.addEventListener("input", () => {
  labelsContainer.style.setProperty("--label-size", labelSizeSlider.value + "px");
  labelSizeValue.textContent = labelSizeSlider.value + "px";
});

function updateDistanceValueText() {
  const dist = modelSize * 4 * (Number(labelDistanceSlider.value) / 100);
  labelDistanceValue.textContent = Number(dist.toPrecision(3)) + " 単位";
}
labelDistanceSlider.addEventListener("input", updateDistanceValueText);
distanceCullCheckbox.addEventListener("change", () => {
  distanceRow.style.opacity = distanceCullCheckbox.checked ? "1" : "0.4";
  labelDistanceSlider.disabled = !distanceCullCheckbox.checked;
});

/* ============================================================
   UIの表示切り替え
============================================================ */
document.getElementById("preset").addEventListener("change", (e) => {
  document.getElementById("custom-colors").style.display =
    e.target.value === "CUSTOM" ? "block" : "none";
});
document.getElementById("use-mid").addEventListener("change", (e) => {
  document.getElementById("color-mid").style.display = e.target.checked ? "block" : "none";
});

/* 手動範囲指定のトグル */
document.getElementById("manual-range").addEventListener("change", (e) => {
  document.getElementById("manual-range-inputs").style.display = e.target.checked ? "block" : "none";
});

/* 「データの最小・最大を入れる」ボタン */
document.getElementById("autofill-range-btn").addEventListener("click", () => {
  const attr = document.getElementById("attribute").value;
  if (!attr || csvRows.length === 0) return;
  let mn = Infinity, mx = -Infinity;
  for (const row of csvRows) {
    const v = (row[attr] ?? "").toString().trim();
    if (v === "") continue;
    const n = Number(v);
    if (Number.isFinite(n)) { mn = Math.min(mn, n); mx = Math.max(mx, n); }
  }
  if (Number.isFinite(mn)) {
    document.getElementById("range-min").value = Number(mn.toPrecision(6));
    document.getElementById("range-max").value = Number(mx.toPrecision(6));
  }
});

/* ============================================================
   サンプルデータ(初期表示用)
   - 石垣のような不整形パネルをその場で生成し、面積等をCSV化する
============================================================ */
function loadSampleData() {
  // --- 乱数(シード固定で毎回同じサンプルになるようにする) ---
  let seed = 42;
  const rand = () => {
    seed = (seed * 1664525 + 1013904223) % 4294967296;
    return seed / 4294967296;
  };

  const group = new THREE.Group();
  group.name = "SampleWall";
  const rows = 6, cols = 8;
  const cell = 1.0;
  const csvLines = ["ID,Area,Width,Height"];
  let id = 1;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // セルの中に、頂点をジッターさせた不整形の凸多角形を作る
      const cx = c * cell, cy = r * cell;
      const nVerts = 5 + Math.floor(rand() * 3); // 5〜7角形
      const pts = [];
      for (let i = 0; i < nVerts; i++) {
        const angle = (i / nVerts) * Math.PI * 2 + rand() * 0.35;
        const radius = cell * (0.32 + rand() * 0.14);
        pts.push(new THREE.Vector2(
          cx + Math.cos(angle) * radius,
          cy + Math.sin(angle) * radius * 0.85
        ));
      }

      const shape = new THREE.Shape(pts);
      const geometry = new THREE.ShapeGeometry(shape);
      const mesh = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({ color: 0xb8bcc4, roughness: 0.85, side: THREE.DoubleSide })
      );
      mesh.name = String(id);
      group.add(mesh);

      // 属性計算: 面積(靴ひも公式)とバウンディングボックスの幅・高さ
      let area = 0;
      for (let i = 0; i < pts.length; i++) {
        const p1 = pts[i], p2 = pts[(i + 1) % pts.length];
        area += p1.x * p2.y - p2.x * p1.y;
      }
      area = Math.abs(area) / 2;
      const xs = pts.map((p) => p.x), ys = pts.map((p) => p.y);
      const width = Math.max(...xs) - Math.min(...xs);
      const height = Math.max(...ys) - Math.min(...ys);
      csvLines.push(`${id},${area.toFixed(6)},${width.toFixed(4)},${height.toFixed(4)}`);
      id++;
    }
  }

  // --- モデルをシーンに設置 ---
  if (modelRoot) scene.remove(modelRoot);
  originalMaterials.clear();
  modelRoot = group;
  scene.add(modelRoot);
  meshes = [];
  modelRoot.traverse((obj) => {
    if (obj.isMesh) {
      meshes.push({ mesh: obj, matchName: obj.name });
      originalMaterials.set(obj.uuid, obj.material);
    }
  });
  frameAll();
  updateDistanceValueText();
  document.getElementById("dropzone-hint").classList.add("hidden");
  document.getElementById("glb-btn").classList.add("loaded");
  document.getElementById("glb-btn").textContent = "(内蔵サンプル) 48枚のパネル";

  // --- CSVも読み込み、少し待ってから自動で色分けを実行 ---
  loadCSVText(csvLines.join("\n"), "(内蔵サンプル) sample.csv");
  setTimeout(() => {
    document.getElementById("apply-btn").click();
    setStatus("サンプルデータを表示中です。\n自分のGLB/CSVを読み込むと置き換わります。");
  }, 100);
}

/* ============================================================
   起動: 全ての宣言が終わったここでレンダリングループを開始する
============================================================ */
animate();
loadSampleData();

</script>
